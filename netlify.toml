[build]
  command = "npm run build"
  publish = "dist"

[functions]
  node_bundler = "esbuild"

# Dedicated redirect for screenshot endpoint (must come before generic /api/*)
[[redirects]]
  from = "/api/send-screenshot"
  to = "/.netlify/functions/send-screenshot"
  status = 200
  force = true

# Proxy for EstrelaBet API
[[redirects]]
  from = "/api/estrelabet/*"
  to = "https://assets.estrelabet.bet.br/:splat"
  status = 200
  force = true

# Proxy for Gaming CDN (Evolution/Superbet game images)
[[redirects]]
  from = "/api/gaming-cdn/*"
  to = "https://prod-cdn-gaming.freetls.fastly.net/:splat"
  status = 200
  force = true

# Proxy for Superbet API
[[redirects]]
  from = "/api/superbet-gaming/*"
  to = "https://superbet-gaming-production.global.ssl.fastly.net/:splat"
  status = 200
  force = true

# Proxy for Superbet State (live casino roulette data)
[[redirects]]
  from = "/api/superbet-state"
  to = "https://superbet-gaming-production.global.ssl.fastly.net/provider-socket/public/api/br/v2/state"
  status = 200
  force = true

# Proxy for Estrela State (live lobby current-state)
[[redirects]]
  from = "/api/estrela-state"
  to = "https://assets.estrelabet.bet.br/dynamic-lobby/current-state.json"
  status = 200
  force = true

# Redirect for API calls to the serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

# Redirect for SPA (React Router) - Must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
