<html lang="pt-BR">

<head>
  <meta charset="UTF-8">

  <title>👑RW TIPS🎮</title>

  <!-- Firebase SDK Compat -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,700&family=JetBrains+Mono:wght@400;700&display=swap');

    /* ── EDITORIAL DARK DESIGN SYSTEM ─────────────────────── */
    :root {
      /* Surfaces */
      --bg:            #07070A;
      --surface:       #0D0D12;
      --surface-raised:#13131A;
      --surface-hover: #17171F;

      /* Borders */
      --border:        #1E1E28;
      --border-subtle: #161620;

      /* Typography */
      --text-primary:  #F0F0F4;
      --text-secondary:#8888A0;
      --text-muted:    #44445A;

      /* Semantic — use ONLY when the data itself is positive/negative */
      --positive:      #34D399;
      --positive-dim:  rgba(52, 211, 153, 0.12);
      --negative:      #F87171;
      --negative-dim:  rgba(248, 113, 113, 0.12);
      --warning:       #FBBF24;
      --warning-dim:   rgba(251, 191, 36, 0.12);

      /* Accent — ONE decorative color for UI elements */
      --accent:        #C8A96E;
      --accent-dim:    rgba(200, 169, 110, 0.12);
      --accent-border: rgba(200, 169, 110, 0.25);

      /* Legacy aliases (para não quebrar código existente) */
      --color-brand:        var(--accent);
      --color-positive:     var(--positive);
      --color-negative:     var(--negative);
      --color-neutral:      var(--text-muted);
      --color-bg:           var(--bg);
      --color-card:         var(--surface);
      --color-card-hover:   var(--surface-hover);
      --color-border:       var(--border);
      --color-border-subtle:var(--border-subtle);
      --color-text-primary: var(--text-primary);
      --color-text-secondary:var(--text-secondary);
      --color-text-muted:   var(--text-muted);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--bg);
      color: var(--text-primary);
      margin: 0;
      letter-spacing: -0.015em;
      font-size: 14px;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .font-mono-numbers {
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: -0.02em;
    }

    /* ── UTILITY CLASSES ────────────────────────────────────── */
    .text-positive  { color: var(--positive) !important; }
    .text-negative  { color: var(--negative) !important; }
    .text-accent    { color: var(--accent) !important; }
    .text-secondary { color: var(--text-secondary) !important; }
    .text-muted     { color: var(--text-muted) !important; }

    .bg-positive-dim { background-color: var(--positive-dim) !important; }
    .bg-negative-dim { background-color: var(--negative-dim) !important; }
    .bg-accent-dim   { background-color: var(--accent-dim) !important; }

    .border-accent   { border-color: var(--accent-border) !important; }

    /* ── SCROLLBARS ──────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: transparent; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.12); }

    .custom-scrollbar::-webkit-scrollbar { height: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius:10px; margin:0 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius:10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

    /* ── ANIMATIONS ──────────────────────────────────────────── */
    @keyframes score-pop {
      0%   { transform: scale(1.05); }
      50%  { transform: scale(1.25); filter: brightness(1.4); }
      100% { transform: scale(1.05); }
    }
    .animate-score-pop { animation: score-pop 0.5s cubic-bezier(0.34,1.56,0.64,1); }

    @keyframes goal-pulse {
      0%   { box-shadow: 0 0 0 0 rgba(52,211,153,0.6); }
      70%  { box-shadow: 0 0 0 12px rgba(52,211,153,0); }
      100% { box-shadow: 0 0 0 0 rgba(52,211,153,0); }
    }
    .animate-goal-pulse { animation: goal-pulse 2s infinite; }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    .animate-spin-slow { animation: spin-slow 8s linear infinite; }

    @keyframes accent-glow-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(200,169,110,0); }
      50%       { box-shadow: 0 0 20px 4px rgba(200,169,110,0.15); }
    }
    .animate-accent-glow { animation: accent-glow-pulse 3s ease-in-out infinite; }

    /* ── SIGNAL CARD (estratégia ativa) ─────────────────────── */
    .card-signaled {
      border-left: 3px solid var(--accent) !important;
      box-shadow: 0 0 0 1px var(--accent-border), 0 12px 40px rgba(0,0,0,0.7);
    }
    .card-neutral {
      border-left: 3px solid var(--border) !important;
    }

    /* ── HEATMAP TABLE CELLS ────────────────────────────────── */
    .heat-high  { background: var(--positive-dim); color: var(--positive); }
    .heat-mid   { background: rgba(52,211,153,0.06); color: rgba(52,211,153,0.75); }
    .heat-low   { color: var(--text-secondary); }
    .heat-none  { color: var(--negative); opacity: 0.6; }

    /* ── METRIC BAR ──────────────────────────────────────────── */
    .metric-bar-bg { background: var(--border-subtle); }
    .metric-bar-fill-high { background: var(--positive); }
    .metric-bar-fill-mid  { background: rgba(200,169,110,0.7); }
    .metric-bar-fill-low  { background: rgba(248,113,113,0.6); }

    /* ── TOOLTIPS ─────────────────────────────────────────────── */
    .tooltip-trigger { position: relative; }
    .tooltip-content {
      position: absolute;
      top: calc(100% + 12px);
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      opacity: 0;
      visibility: hidden;
      transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
      z-index: 5000;
      pointer-events: none;
      width: 240px;
    }
    .tooltip-trigger:hover .tooltip-content {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
    }
    .tooltip-content::after {
      content: '';
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      border-width: 6px;
      border-style: solid;
      border-color: transparent transparent rgba(13,13,18,0.98) transparent;
    }

    /* ── CARD BASE ───────────────────────────────────────────── */
    .card-base {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 1rem;
    }
    .card-base:hover { background: var(--surface-hover); }
  </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>

  <script>
    (function () {
      const SECRET_KEY = 'rw_admin_2026';
      const urlParams = new URLSearchParams(window.location.search);
      const hasAccess = urlParams.get('devMode') === SECRET_KEY;

      if (hasAccess) {
        console.warn("🔐 RW TIPS: Mode Desenvolvedor Ativo.");
        return;
      }

      // 1. Bloqueios de Teclado e Mouse
      document.addEventListener('contextmenu', e => e.preventDefault());
      document.addEventListener('keydown', e => {
        if (e.keyCode === 123 ||
          (e.ctrlKey && e.shiftKey && [73, 74, 67].includes(e.keyCode)) ||
          (e.ctrlKey && e.keyCode === 85)) {
          e.preventDefault();
          return false;
        }
      });

      // 2. Detecção por Comportamento de Objetos (Console)
      const element = new Image();
      Object.defineProperty(element, 'id', {
        get: function () {
          lockdown();
        }
      });

      function lockdown() {
        document.body.innerHTML = `
          <div style="background:#000;color:#ef4444;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:sans-serif;text-align:center;padding:40px;z-index:999999;position:fixed;top:0;left:0;width:100%;">
            <h1 style="font-size:40px;font-weight:900;margin-bottom:20px;letter-spacing:-1px;">ACESSO BLOQUEADO</h1>
            <p style="font-size:18px;color:#fff;opacity:0.7;max-width:600px;">Tentativa de inspeção detectada. O sistema foi bloqueado por segurança.</p>
            <div style="margin-top:40px;padding:20px;border:1px solid #ef444433;border-radius:12px;font-family:monospace;font-size:12px;color:#ef4444;">SECURITY_ERROR: DEVTOOLS_PRESENT</div>
            <button onclick="location.reload()" style="margin-top:30px;padding:12px 24px;background:#ef4444;color:#000;border:none;border-radius:8px;font-weight:900;cursor:pointer;">TENTAR NOVAMENTE</button>
          </div>`;

        // Loop infinito que consome recursos se o console estiver aberto
        setInterval(function () {
          (function () {
            return false;
          }['constructor']('debugger')['call']());
        }, 50);
      }

      // Verifica constantemente emitindo o objeto no console
      setInterval(function () {
        console.log(element);
        console.clear();

        // Verifica tamanho (DevTools lateral/inferior)
        const threshold = 160;
        if (window.outerWidth - window.innerWidth > threshold ||
          window.outerHeight - window.innerHeight > threshold) {
          lockdown();
        }
      }, 500);

      // Trava debugger padrão
      const devtoolsCheck = setInterval(() => {
        const start = Date.now();
        debugger;
        if (Date.now() - start > 100) {
          lockdown();
          clearInterval(devtoolsCheck);
        }
      }, 500);
    })();
  </script>
